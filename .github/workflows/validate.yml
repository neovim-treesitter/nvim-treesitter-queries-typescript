name: Validate Queries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read parser manifest
        id: manifest
        run: |
          echo "url=$(jq -r '.url // ""' parser.json)"           >> "$GITHUB_OUTPUT"
          echo "min_version=$(jq -r '.min_version // "HEAD"' parser.json)" >> "$GITHUB_OUTPUT"
          echo "location=$(jq -r '.location // ""' parser.json)" >> "$GITHUB_OUTPUT"
          echo "queries_only=$(jq -r '.queries_only // false' parser.json)" >> "$GITHUB_OUTPUT"

      - name: Install tree-sitter CLI
        if: steps.manifest.outputs.queries_only != 'true'
        uses: tree-sitter/setup-action/cli@v2

      - name: Fetch and build parser
        if: steps.manifest.outputs.queries_only != 'true' && steps.manifest.outputs.url != ''
        env:
          URL:      ${{ steps.manifest.outputs.url }}
          REF:      ${{ steps.manifest.outputs.min_version }}
          LOCATION: ${{ steps.manifest.outputs.location }}
        run: |
          curl -sL "$URL/archive/$REF.tar.gz" -o parser.tar.gz
          tar -xzf parser.tar.gz
          REPO=$(basename "$URL")
          SRC="${REPO}-${REF#v}"
          [ -n "$LOCATION" ] && SRC="$SRC/$LOCATION"
          mkdir -p /tmp/ts-validate/parsers
          tree-sitter build --output /tmp/ts-validate/parsers/parser.so "$SRC"

      - name: Install ts-query-ls
        uses: nickel-lang/ts-query-ls-action@v1
        with:
          version: latest

      - name: Validate queries
        if: steps.manifest.outputs.queries_only != 'true'
        run: |
          ts-query-ls check \
            --parser /tmp/ts-validate/parsers/parser.so \
            queries/

      - name: Validate queries (queries_only - no parser binary)
        if: steps.manifest.outputs.queries_only == 'true'
        run: |
          echo "queries_only lang: skipping parser build, checking .scm syntax only"
          for f in queries/*.scm; do
            tree-sitter query --test "$f" 2>&1 || true
          done
