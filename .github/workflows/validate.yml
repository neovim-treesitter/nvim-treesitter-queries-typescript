name: Validate Queries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read parser manifest
        id: manifest
        run: |
          echo "lang=$(jq -r '.lang // ""' parser.json)"                     >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url // ""' parser.json)"                       >> "$GITHUB_OUTPUT"
          echo "min_version=$(jq -r '.min_version // "HEAD"' parser.json)"   >> "$GITHUB_OUTPUT"
          echo "location=$(jq -r '.location // ""' parser.json)"             >> "$GITHUB_OUTPUT"
          echo "queries_only=$(jq -r '.queries_only // false' parser.json)"  >> "$GITHUB_OUTPUT"

      - name: Install tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2

      - name: Build parser
        if: steps.manifest.outputs.queries_only != 'true' && steps.manifest.outputs.url != ''
        env:
          URL:      ${{ steps.manifest.outputs.url }}
          REF:      ${{ steps.manifest.outputs.min_version }}
          LOCATION: ${{ steps.manifest.outputs.location }}
          LANG:     ${{ steps.manifest.outputs.lang }}
        run: |
          curl -sL "$URL/archive/$REF.tar.gz" -o parser.tar.gz
          tar -xzf parser.tar.gz
          REPO=$(basename "$URL")
          SRC="${REPO}-${REF#v}"
          [ -n "$LOCATION" ] && SRC="$SRC/$LOCATION"
          mkdir -p /tmp/ts-parsers
          tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$SRC"

      - name: Write .tsqueryrc.json
        run: |
          cat > .tsqueryrc.json <<'EOF'
          {
            "parser_install_directories": ["/tmp/ts-parsers"],
            "supported_abi_versions": { "start": 13, "end": 15 },
            "language_retrieval_patterns": [
              "nvim-treesitter-queries-([^/]+)/queries/[^/]+\\.scm$"
            ]
          }
          EOF

      - name: Install ts_query_ls
        run: |
          curl -fL https://github.com/ribru17/ts_query_ls/releases/latest/download/ts_query_ls-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz

      - name: Check queries
        run: ./ts_query_ls check queries/
